<head>
<style>
body{background-color:black;}
td{border:1px solid white;min-width:20%;max-width:20%;min-height:20%;height:20%;}

<script>
//Hello nerd. Plz don't judge too hard, i couldn't be bothered to do it smart and ctrl+D was right there.

function shuffle(array) {
  let currentIndex = array.length;

  // While there remain elements to shuffle...
  while (currentIndex != 0) {

    // Pick a remaining element...
    let randomIndex = Math.floor(Math.random() * currentIndex);
    currentIndex--;

    // And swap it with the current element.
    [array[currentIndex], array[randomIndex]] = [
      array[randomIndex], array[currentIndex]];
  }
}

function Generate(){
	var x = document.getElementById("Inputs").value.split(",")//.forEach(e=>{y.push(e);console.log(y)})
	shuffle(x)
	if(x.length < 25){alert("Not enough bingo options");return;}
	for(i = 0; i < 5; i++){
		for(j = 0; j<5;j++){
			if(i == 2 && j ==2){document.getElementById("bingo").children[0].children[i].children[j].innerText="FREE SPACE!\n"}
			else{document.getElementById("bingo").children[0].children[i].children[j].innerText=""}
			document.getElementById("bingo").children[0].children[i].children[j].innerText += x[j+(i*5)];
		}
	}
}
	function clickbox(e){
		if(e.loops == undefined){
			
			e.loops=0;
		}
		if(e.style.backgroundColor.startsWith("rgba")){
			var alpa = Number(e.style.backgroundColor.split(",")[3].replace(")",""));
			if(!(alpa<0.9)){
				e.loops++;
				alpa=0.3;
			}
			e.style.backgroundColor="rgba("+(255-(((e.loops*128)-255)))+", 0, "+(e.loops*128)+", "+(alpa+0.1)+")";
		}
		else{
			e.style.backgroundColor="rgba(255, 0, 0, 0.3)";
		}
		console.log(e.style.backgroundColor);
	}
</script>
</head>
<body>

<div style="width:90vw;height:10vh;margin:auto;"><textarea id="Inputs" style="width:100%;height:100%;" placeholder="Enter bingo options, comma seperated (ex. Chair stream, Bald!, Bad at platformers, etc.). This will then generate a randomized bingo card based off your entries"></textarea></div>
<div style="width:60px;margin:auto;margin-bottom:5vh;"><button onclick="Generate();">Generate</button></div>
<table id="bingo" style="width:90vw;height:80vh;margin:auto;border:1px solid white;color:white;text-align:center; vertical-align:top">
	<tr>
